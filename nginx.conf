server {
    listen 80;
    server_name _;

    root /var/www/zeze-bizou/public;

    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # WordPress core (important)
    location ~ ^/(wp-admin|wp-includes|wp-content|wp-login\.php|xmlrpc\.php) {
        root /var/www/zeze-bizou/public/wordpress;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        # 🔥 FIX CRITIQUE
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}
