services:
  db:
    image: mariadb:11.1
    container_name: zeze-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql

  php:
    build: .
    container_name: zeze-php
    restart: unless-stopped
    working_dir: /var/www/zeze-bizou
    volumes:
      - ./public:/var/www/zeze-bizou/public
      - ./public/wp-content/uploads:/var/www/zeze-bizou/public/wp-content/uploads
      - ./.env/:/var/www/zeze-bizou/.env
    expose:
      - "9000"
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: zeze-nginx
    restart: unless-stopped
    # ports:
    #   - "80:80"
    volumes:
      - ./public:/var/www/zeze-bizou/public
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wp.rule=PathPrefix(`/`)"
      - "traefik.http.routers.wp.entrypoints=web"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: zeze-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: ${DB_HOST}
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    labels:
      - "traefik.enable=true"
      # - "traefik.http.routers.phpmyadmin.rule=PathPrefix(`pma.zeze-bizou.es`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=web"
      # Pour futur SSL :
      #- "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      #- "traefik.http.routers.phpmyadmin.tls=true"
    ports:
      - "8080:80"            # accessible sur http://VPS:8080
    depends_on:
      - db

  traefik:
    image: traefik:v3.6
    container_name: zeze-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "traefik.http.routers.wp.rule=PathPrefix(`/`)" # Provisoire en attendant le domaine
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080" # dashboard Traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  db_data:
