services:
  db:
    image: mysql:8.0
    container_name: zeze-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql

  php:
    image: wordpress:php8.2-fpm
    container_name: zeze-php
    restart: unless-stopped
    working_dir: /var/www/wordpress
    volumes:
      - ./public:/var/www/wordpress
      - ./public/wp-config.php:/var/www/wordpress/wp-config.php

  web:
    image: nginx:alpine
    container_name: zeze-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/wordpress:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  whodb:
    image: clidey/whodb
    ports:
      - "8080:8080"

volumes:
  db_data:
